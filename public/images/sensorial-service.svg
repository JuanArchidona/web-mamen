<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#110820"/>
      <stop offset="100%" stop-color="#08040f"/>
    </radialGradient>
    <radialGradient id="crystalGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#9b59b6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9b59b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#b476d4"/>
      <stop offset="40%" stop-color="#7a3da8"/>
      <stop offset="100%" stop-color="#3d1a5c"/>
    </radialGradient>
    <radialGradient id="c2" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#d4a0f0"/>
      <stop offset="50%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#4a2070"/>
    </radialGradient>
    <radialGradient id="c3" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#c8e0ff"/>
      <stop offset="40%" stop-color="#6ab0e8"/>
      <stop offset="100%" stop-color="#2a5588"/>
    </radialGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="crystalGlow"><feGaussianBlur stdDeviation="6" result="cb"/><feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="starGlow"><feGaussianBlur stdDeviation="2" result="cb"/><feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="300" rx="350" ry="220" fill="url(#crystalGlow)" filter="url(#softBlur)" opacity="0.6"/>
  <ellipse cx="300" cy="200" rx="120" ry="100" fill="url(#goldGlow)" filter="url(#softBlur)" opacity="0.4"/>

  <!-- Stars in background -->
  <circle cx="80" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="150" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="250" cy="80" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="600" cy="40" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="700" cy="90" r="1" fill="white" opacity="0.5"/>
  <circle cx="720" cy="160" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="100" cy="180" r="1" fill="white" opacity="0.5"/>
  <circle cx="680" cy="280" r="1.5" fill="white" opacity="0.3"/>

  <!-- Main large crystal (center) -->
  <g transform="translate(370,130)" filter="url(#crystalGlow)">
    <polygon points="30,0 60,60 55,160 30,180 5,160 0,60" fill="url(#c1)" opacity="0.92"/>
    <polygon points="30,0 60,60 30,180" fill="rgba(255,255,255,0.12)"/>
    <polygon points="30,0 0,60 30,180" fill="rgba(0,0,0,0.15)"/>
    <!-- Facet lines -->
    <line x1="30" y1="0" x2="0" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
    <line x1="30" y1="0" x2="60" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
    <line x1="0" y1="60" x2="30" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  </g>

  <!-- Left crystal cluster -->
  <g transform="translate(220,200)" filter="url(#crystalGlow)">
    <polygon points="20,0 38,45 35,110 20,125 5,110 2,45" fill="url(#c2)" opacity="0.85"/>
    <polygon points="20,0 38,45 20,125" fill="rgba(255,255,255,0.1)"/>
  </g>
  <g transform="translate(248,220)">
    <polygon points="12,0 22,30 20,75 12,85 4,75 2,30" fill="url(#c2)" opacity="0.7"/>
  </g>

  <!-- Right crystal cluster -->
  <g transform="translate(490,190)" filter="url(#crystalGlow)">
    <polygon points="18,0 35,40 32,105 18,118 4,105 1,40" fill="url(#c3)" opacity="0.85"/>
    <polygon points="18,0 35,40 18,118" fill="rgba(255,255,255,0.15)"/>
  </g>
  <g transform="translate(516,215)">
    <polygon points="12,0 22,32 20,80 12,90 4,80 2,32" fill="url(#c3)" opacity="0.7"/>
  </g>

  <!-- Small crystals scattered -->
  <g transform="translate(155,320)">
    <polygon points="12,0 20,25 18,60 12,68 6,60 4,25" fill="url(#c1)" opacity="0.6"/>
  </g>
  <g transform="translate(610,300)">
    <polygon points="10,0 18,22 16,55 10,62 4,55 2,22" fill="url(#c2)" opacity="0.55"/>
  </g>

  <!-- Ground/marble surface -->
  <ellipse cx="400" cy="440" rx="380" ry="50" fill="#0d0618" opacity="0.8"/>
  <rect x="0" y="420" width="800" height="80" fill="#0a0414"/>

  <!-- Magical particles -->
  <circle cx="340" cy="200" r="2" fill="#D4AF37" opacity="0.8" filter="url(#starGlow)"/>
  <circle cx="460" cy="220" r="1.5" fill="#d4a0ff" opacity="0.9" filter="url(#starGlow)"/>
  <circle cx="300" cy="280" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="520" cy="260" r="2" fill="#D4AF37" opacity="0.7" filter="url(#starGlow)"/>
  <circle cx="400" cy="160" r="2.5" fill="#fff" opacity="0.5" filter="url(#starGlow)"/>

  <!-- Title text -->
  <text x="400" y="130" font-family="Georgia, serif" font-size="26" fill="#d4a0ff" text-anchor="middle" opacity="0.85" filter="url(#starGlow)">Conexión Sensorial</text>
  <text x="400" y="158" font-family="Georgia, serif" font-size="14" fill="#9b59b6" text-anchor="middle" opacity="0.7">Energía · Intuición · Guía</text>
</svg>
